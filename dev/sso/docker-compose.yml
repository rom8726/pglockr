# SSO demo: a real authenticating reverse proxy in front of pglockr.
#
#   browser → oauth2-proxy (:4180) → pglockr (host :8111, proxy/network mode)
#                     │
#                     └─ OIDC → mock-oauth2-server (:8083), a test IdP that lets
#                        you pick the email + groups at login.
#
# oauth2-proxy authenticates the user, then injects X-Forwarded-Email and
# X-Forwarded-Groups to pglockr, which maps the group to a role.
#
# See README.md for the run steps (pglockr runs on the host so you can rebuild it).
name: pglockr-sso

services:
  # Test OpenID Connect provider. It derives its issuer from the request Host,
  # so using host.docker.internal makes the issuer identical for the browser and
  # for oauth2-proxy (see README about /etc/hosts).
  idp:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "8083:8080"
    environment:
      JSON_CONFIG: |
        { "interactiveLogin": true, "tokenCallbacks": [] }

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --provider=oidc
      - --oidc-issuer-url=http://host.docker.internal:8083/default
      - --client-id=pglockr
      - --client-secret=pglockr-secret
      - --email-domain=*
      - --scope=openid email groups
      - --oidc-groups-claim=groups
      - --cookie-secret=0123456789abcdef0123456789abcdef
      - --cookie-secure=false
      - --redirect-url=http://localhost:4180/oauth2/callback
      # Pass the authenticated identity to the upstream as X-Forwarded-Email /
      # X-Forwarded-Groups (reverse-proxy mode).
      - --pass-user-headers=true
      # Upstream: pglockr running on the host in proxy/network mode.
      - --upstream=http://host.docker.internal:8111
    ports:
      - "4180:4180"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - idp
    # oauth2-proxy does OIDC discovery at startup and exits if the IdP isn't
    # ready yet; restart until discovery succeeds.
    restart: unless-stopped
