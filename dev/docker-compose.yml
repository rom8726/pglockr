# Local test bench for pglockr: a PostgreSQL you can point pglockr at, plus
# load scripts (see ./scenarios) that manufacture blocking trees on demand.
name: pglockr-dev

services:
  db:
    image: postgres:16
    container_name: pglockr-dev-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    # Tuned so lock waits and deadlocks are visible/quick for testing.
    command:
      - postgres
      - -c
      - log_lock_waits=on
      - -c
      - deadlock_timeout=1s
      - -c
      - log_line_prefix=%m [%p] %u@%d
    ports:
      - "55432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./scenarios/sql:/scenarios:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 2s
      timeout: 3s
      retries: 15
