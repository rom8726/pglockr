apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pglockr.fullname" . }}
  labels:
    {{- include "pglockr.labels" . | nindent 4 }}
spec:
  # Single replica: pglockr keeps local state (SQLite history/audit) per cluster.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pglockr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pglockr.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.metricsScrapeAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: /metrics
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        # distroless:nonroot uid; also makes a mounted PVC writable.
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: pglockr
          image: {{ include "pglockr.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config", "/etc/pglockr/pglockr.yaml"]
          env:
            {{- if .Values.persistence.enabled }}
            - name: PGLOCKR_DB_PATH
              value: {{ printf "%s/history.db" .Values.persistence.mountPath | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "pglockr.secretName" . }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/pglockr
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pglockr.fullname" . }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pglockr.fullname" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
