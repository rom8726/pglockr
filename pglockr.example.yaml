# Example pglockr configuration. Secrets/paths are NOT read from this file:
#   PGLOCKR_DSN     — target database connection string (required)
#   PGLOCKR_TOKEN   — static access token for the UI/API (required)
#   PGLOCKR_DB_PATH — SQLite history file; setting it enables persistence
# Optional env overrides: PGLOCKR_HTTP_ADDR, PGLOCKR_CLUSTER
#
# Run: PGLOCKR_DSN=... PGLOCKR_TOKEN=... ./pglockr -config pglockr.yaml

cluster:
  name: default

poll:
  interval: 1s          # how often to snapshot the target
  ringSize: 300         # in-memory snapshots retained (~5 min at 1s)
  statementTimeout: 3s  # per-query timeout against the target
  waitersOnly: false    # call pg_blocking_pids only for backends in lock-wait

http:
  addr: ":8080"

persist:
  # Durable snapshot history so the scrubber survives restarts. Enabled
  # automatically when PGLOCKR_DB_PATH is set (point it at a mounted volume).
  enabled: false
  retention: 24h    # prune snapshots older than this (0 = keep forever)
